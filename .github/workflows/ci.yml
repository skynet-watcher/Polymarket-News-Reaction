name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite+aiosqlite:///./test_ci.db
      OPENAI_API_KEY: ""
      BACKGROUND_POLL_NEWS_INTERVAL_SECONDS: "0"
      BACKGROUND_PROCESS_CANDIDATES_INTERVAL_SECONDS: "0"
      BACKGROUND_LAG_PIPELINE_INTERVAL_SECONDS: "0"
      BACKGROUND_SETTLE_INTERVAL_SECONDS: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: pytest -q
